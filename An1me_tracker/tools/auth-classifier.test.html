<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Auth Classifier — Unit Test Harness</title>
    <style>
        body { font-family: ui-monospace, Menlo, Consolas, monospace; padding: 20px; max-width: 980px; margin: 0 auto; }
        h1 { font-size: 18px; }
        table { border-collapse: collapse; width: 100%; margin-top: 12px; }
        th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; font-size: 12px; }
        th { background: #f5f5f5; }
        .pass { color: #0a7d28; font-weight: 600; }
        .fail { color: #c8102e; font-weight: 600; }
        .summary { margin-top: 16px; padding: 10px 14px; border-radius: 6px; }
        .ok { background: #e6f5ea; border: 1px solid #0a7d28; }
        .err { background: #fdecee; border: 1px solid #c8102e; }
        code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; }
    </style>
</head>
<body>
<h1>Auth Classifier — Unit Test Harness (Task 1)</h1>
<p>Open this file directly in a browser. It loads <code>../src/common/auth-classifier.js</code>
   and runs the matrix below. Expected: every row PASS.</p>
<div id="summary" class="summary"></div>
<table id="results">
    <thead>
        <tr>
            <th>#</th>
            <th>Description</th>
            <th>Input</th>
            <th>Expected</th>
            <th>Actual</th>
            <th>Result</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
<script src="../src/common/auth-classifier.js"></script>
<script>
(function () {
    'use strict';
    const Cl = window.AnimeTrackerAuthClassifier;
    if (!Cl) {
        document.getElementById('summary').className = 'summary err';
        document.getElementById('summary').textContent = 'AnimeTrackerAuthClassifier global is missing. Did the script load?';
        return;
    }

    const tbody = document.querySelector('#results tbody');
    const cases = [
        // ─── HTTP 200 ─────────────────────────────────────────────────────
        { desc: '200 (success)', s: 200, b: '', exp: { permanent: false, transient: true } },
        // ─── HTTP 400 + permanent code ────────────────────────────────────
        { desc: '400 + INVALID_REFRESH_TOKEN',          s: 400, b: '{"error":{"message":"INVALID_REFRESH_TOKEN"}}',          exp: { permanent: true, transient: false } },
        { desc: '400 + TOKEN_EXPIRED',                  s: 400, b: '{"error":{"message":"TOKEN_EXPIRED"}}',                  exp: { permanent: true, transient: false } },
        { desc: '400 + USER_DISABLED',                  s: 400, b: '{"error":{"message":"USER_DISABLED"}}',                  exp: { permanent: true, transient: false } },
        { desc: '400 + USER_NOT_FOUND',                 s: 400, b: 'USER_NOT_FOUND',                                          exp: { permanent: true, transient: false } },
        { desc: '400 + INVALID_GRANT',                  s: 400, b: 'INVALID_GRANT',                                           exp: { permanent: true, transient: false } },
        { desc: '400 + invalid_grant (lowercase)',      s: 400, b: 'invalid_grant',                                           exp: { permanent: true, transient: false } },
        { desc: '400 + CREDENTIAL_TOO_OLD_LOGIN_AGAIN', s: 400, b: 'CREDENTIAL_TOO_OLD_LOGIN_AGAIN',                          exp: { permanent: true, transient: false } },
        { desc: '400 + MISSING_REFRESH_TOKEN',          s: 400, b: 'MISSING_REFRESH_TOKEN',                                   exp: { permanent: true, transient: false } },
        // ─── HTTP 400 + unknown / no body ─────────────────────────────────
        { desc: '400 + no body (transient)',     s: 400, b: '',                                          exp: { permanent: false, transient: true } },
        { desc: '400 + unknown code (transient)', s: 400, b: '{"error":{"message":"WHAT_IS_THIS"}}',     exp: { permanent: false, transient: true } },
        // ─── HTTP 401 / 403 — RECLASSIFIED AS TRANSIENT ──────────────────
        { desc: '401 (reclassified transient)',  s: 401, b: '',                                          exp: { permanent: false, transient: true } },
        { desc: '403 (reclassified transient)',  s: 403, b: '',                                          exp: { permanent: false, transient: true } },
        { desc: '401 + body (still transient)',  s: 401, b: '{"error":{"message":"INVALID_REFRESH_TOKEN"}}', exp: { permanent: false, transient: true } },
        // ─── 5xx / network ───────────────────────────────────────────────
        { desc: '500 (transient)',  s: 500, b: '',  exp: { permanent: false, transient: true } },
        { desc: '503 (transient)',  s: 503, b: '',  exp: { permanent: false, transient: true } },
        { desc: '408 (transient)',  s: 408, b: '',  exp: { permanent: false, transient: true } },
        { desc: '429 (transient)',  s: 429, b: '',  exp: { permanent: false, transient: true } },
        { desc: '0 (network error → transient)', s: 0, b: '', exp: { permanent: false, transient: true } },
    ];

    let passed = 0;
    let failed = 0;
    cases.forEach((c, i) => {
        const got = Cl.classify(c.s, c.b);
        const ok = got.permanent === c.exp.permanent && got.transient === c.exp.transient;
        if (ok) passed++; else failed++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${c.desc}</td>
            <td><code>${c.s} ${c.b ? '· ' + c.b.slice(0, 40) : ''}</code></td>
            <td>perm=${c.exp.permanent} trans=${c.exp.transient}</td>
            <td>perm=${got.permanent} trans=${got.transient}</td>
            <td class="${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</td>`;
        tbody.appendChild(tr);
    });

    // ─── isTransientNetworkError matrix ──────────────────────────────────
    const netCases = [
        { desc: 'TypeError ("Failed to fetch")', e: Object.assign(new TypeError('Failed to fetch'), {}), exp: true },
        { desc: 'AbortError',                     e: Object.assign(new Error('aborted'), { name: 'AbortError' }), exp: true },
        { desc: '{ isTimeout: true }',            e: { isTimeout: true, message: 'timed out' }, exp: true },
        { desc: 'Safari "Load failed"',           e: new TypeError('Load failed'), exp: true },
        { desc: 'plain Error("oops")',            e: new Error('oops'), exp: false },
        { desc: 'null',                           e: null, exp: false },
    ];
    netCases.forEach((c, i) => {
        const got = Cl.isTransientNetworkError(c.e);
        const ok = got === c.exp;
        if (ok) passed++; else failed++;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${cases.length + i + 1}</td>
            <td>isTransientNetworkError · ${c.desc}</td>
            <td><code>${c.e?.name || typeof c.e}: ${c.e?.message || ''}</code></td>
            <td>${c.exp}</td>
            <td>${got}</td>
            <td class="${ok ? 'pass' : 'fail'}">${ok ? 'PASS' : 'FAIL'}</td>`;
        tbody.appendChild(tr);
    });

    const sum = document.getElementById('summary');
    sum.className = 'summary ' + (failed === 0 ? 'ok' : 'err');
    sum.textContent = `${passed} passed · ${failed} failed · ${passed + failed} total`;
})();
</script>
</body>
</html>
